<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg, #1a173a 0%, #2d2760 50%, #1a173a 100%);
            font-family:'Montserrat',sans-serif; color:#fff;
        }
        .card {
            background:rgba(28,26,74,0.95); width:min(420px,90vw);
            padding:40px 35px; border-radius:24px;
            border:1px solid rgba(124,102,227,0.3);
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align:center; margin-bottom:25px; }
        .logo img { width:120px; filter:drop-shadow(0 0 20px rgba(124,102,227,0.7)); }
        h1 { text-align:center; font-size:28px; color:#e0d8fe; margin-bottom:8px; }
        .subtitle { text-align:center; font-size:13px; color:#8892BF; margin-bottom:30px; }
        label { display:block; font-size:14px; font-weight:600; color:#d1d1f7; margin-bottom:8px; }
        input {
            width:100%; padding:14px 18px; border:none; border-radius:14px;
            background:rgba(62,58,131,0.8); color:#fff; font-size:15px;
            font-family:inherit; outline:none; margin-bottom:18px; transition:0.3s;
        }
        input:focus { background:#4a45a3; box-shadow:0 0 0 2px #5c4eb3; }
        input::placeholder { color:rgba(255,255,255,0.4); }
        .btn {
            width:100%; padding:14px; border:none; border-radius:20px;
            background:#4c429c; color:#fff; font-size:17px; font-weight:700;
            cursor:pointer; transition:0.3s; font-family:inherit; margin-top:5px;
        }
        .btn:hover { background:#5d53b8; transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .error { color:#ff6b6b; font-size:13px; text-align:center; margin-top:12px; min-height:18px; }
        .badge {
            position:fixed; top:12px; right:12px; background:linear-gradient(135deg,#4F5B93,#8892BF);
            padding:5px 12px; border-radius:8px; font-size:11px; font-weight:600;
            letter-spacing:1px; display:flex; align-items:center; gap:6px;
        }
        .badge::before { content:''; width:7px; height:7px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; }
    </style>
</head>
<body>
    <div class="badge">PHP + MySQL</div>

    <div class="card">
        <div class="logo"><img src="../frontend/img/Logo.png" alt="ChatNCT"></div>
        <h1>Login</h1>
        <p class="subtitle">PHP + MySQL Backend</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Student code or instructor name" required autocomplete="username">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="submit" class="btn" id="submitBtn">Login</button>
            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMsg');
        btn.disabled = true; btn.textContent = 'Signing in...'; err.textContent = '';

        try {
            const res = await fetch('api/auth/login.php', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();

            if (data.status === 'success') {
                localStorage.setItem('chatnct_username', data.username);
                localStorage.setItem('chatnct_role', data.role);
                localStorage.setItem('chatnct_is_admin', data.is_admin ? 'true' : 'false');
                localStorage.setItem('chatnct_access_token', data.access_token);
                localStorage.setItem('chatnct_user_id', data.user_id || '');
                localStorage.setItem('chatnct_backend', 'php');
                window.location.href = 'dashboard.html';
            } else {
                err.textContent = data.message || 'Login failed.';
            }
        } catch(e) {
            err.textContent = 'Connection error. Is XAMPP running?';
        }
        btn.disabled = false; btn.textContent = 'Login';
    });
    </script>
</body>
</html>
