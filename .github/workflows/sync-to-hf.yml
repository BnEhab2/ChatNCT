name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:
  
jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config user.email "minadiaa@nct.edu"
          git config user.name "Mina Diaa"

          # Create a fresh orphan branch (no history = no old binary files)
          git checkout --orphan hf-clean
          git add -A
          git commit -m "Deploy to Hugging Face Space"

          # Migrate any binary files to LFS before pushing
          git lfs migrate import --include="*.shard1,*-shard1,*shard*,*.caffemodel,*.task,*.pkl,*.faiss,*.db,*.rar" --yes

          # Add HF remote and push
          git config lfs.allowincompletepush true
          git remote add hf https://miza22:$HF_TOKEN@huggingface.co/spaces/miza22/ChatNCT
          git lfs push --all hf
          git push hf hf-clean:main --force
