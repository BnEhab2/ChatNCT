services:
  - type: web
    name: chatnct-backend
    env: python
    buildCommand: "pip install -r requirments.txt"
    startCommand: "python run_production.py"
    envVars:
      - key: SUPABASE_URL
        value: "your_supabase_url" # Set in Render dashboard
      - key: SUPABASE_ANON_KEY
        value: "your_supabase_key" # Set in Render dashboard
      - key: GEMINI_API_KEY
        value: "your_gemini_key" # Set in Render dashboard
      - key: QR_SECRET
        value: "your_qr_secret" # Set in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0 # Set specific python version suited for TF/Mediapipe
