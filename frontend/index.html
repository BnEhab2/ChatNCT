<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="ChatNCT — AI-Powered University Assistant. Login to access chat, attendance, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600&family=Poetsen+One&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a173a;
            --card-bg: rgba(28, 26, 74, 0.95);
            --input-bg: rgba(62, 58, 131, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #b0a9ff;
            --accent-purple: #5c4eb3;
            --submit-btn: #4c429c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; height: 100%; overflow: hidden; }
        body {
            height: 100vh; height: 100dvh;
            background: var(--bg-dark); color: var(--text-primary);
            overflow: hidden; width: 100%; max-width: 100vw;
            font-family: 'Montserrat', sans-serif;
        }
        .scroll-container {
            height: 100vh; height: 100dvh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scroll-behavior: auto; scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .section {
            height: 100vh; height: 100dvh; width: 100%;
            scroll-snap-align: start; position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-dark);
        }
        .animated-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(124,102,227,0.6) 0%, transparent 70%);
            animation: float 15s infinite ease-in-out; opacity: 0.5;
        }
        .particle:nth-child(1){width:80px;height:80px;top:20%;left:10%;animation-delay:0s;}
        .particle:nth-child(2){width:120px;height:120px;top:60%;left:80%;animation-delay:-5s;}
        .particle:nth-child(3){width:60px;height:60px;top:70%;left:10%;animation-delay:-10s;}
        .particle:nth-child(4){width:100px;height:100px;top:40%;left:75%;animation-delay:-2s;}
        .particle:nth-child(5){width:70px;height:70px;top:20%;left:40%;animation-delay:-7s;}
        .particle:nth-child(6){width:90px;height:90px;top:70%;left:80%;animation-delay:-12s;}
        .particle:nth-child(7){width:40px;height:40px;top:80%;left:20%;animation-delay:-5s;}
        .particle:nth-child(8){width:80px;height:80px;top:10%;left:70%;animation-delay:-4s;}
        .particle:nth-child(9){width:30px;height:30px;top:40%;left:50%;animation-delay:-19s;}
        .particle:nth-child(10){width:80px;height:80px;top:75%;left:40%;animation-delay:-16s;}
        @keyframes float {
            0%,100%{transform:translate(0,0) scale(1);}
            25%{transform:translate(30px,-20px) scale(1.1);}
            50%{transform:translate(-20px,30px) scale(0.9);}
            75%{transform:translate(20px,20px) scale(1.05);}
        }
        .glow-orb {
            position: absolute; border-radius: 50%;
            filter: blur(40px); animation: pulse 8s infinite ease-in-out;
        }
        .glow-orb:nth-child(1){width:200px;height:200px;background:rgba(124,102,227,0.4);top:30%;left:20%;}
        .glow-orb:nth-child(2){width:150px;height:150px;background:rgba(76,66,156,0.5);bottom:20%;right:25%;animation-delay:-4s;}
        @keyframes pulse {0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:0.9;transform:scale(1.2);}}

        .morph-logo {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(1);
            width: clamp(150px,25vw,280px); max-width:90vw;
            z-index:1001; filter:drop-shadow(0 0 30px rgba(124,102,227,0.8));
            animation:logoGlow 3s infinite ease-in-out; pointer-events:none;
        }
        .morph-logo img { width:100%; height:auto; display:block; }
        @keyframes logoGlow {0%,100%{filter:drop-shadow(0 0 30px rgba(124,102,227,0.8));}50%{filter:drop-shadow(0 0 50px rgba(124,102,227,1));}}

        .intro-tagline {
            font-family:'Montserrat',sans-serif; font-size:clamp(14px,2vw,18px);
            color:#b0a9ff; opacity:0.9; margin-top:clamp(80px,15vh,120px);
            z-index:10; animation:fadeInUp 1s ease 0.3s both;
            text-align:center; padding:0 20px; transition:opacity 0.1s ease;
        }
        .scroll-indicator {
            position:fixed; bottom:40px!important; left:50%!important;
            transform:translateX(-50%)!important; display:flex!important;
            flex-direction:column!important; align-items:center!important;
            gap:12px; z-index:9999!important; cursor:pointer; opacity:1;
        }
        .scroll-track { width:2px; height:60px; background:rgba(221,216,253,0.3); border-radius:2px; position:relative; }
        .scroll-ball { position:absolute; top:0; left:50%; transform:translateX(-50%); width:10px; height:10px; background:#ddd8fd; border-radius:50%; animation:scrollUpDown 2s infinite ease-in-out; }
        @keyframes scrollUpDown {0%,100%{top:0;opacity:0.4;}50%{top:calc(100% - 10px);opacity:1;}}
        .scroll-text { font-family:'Montserrat',sans-serif; font-size:11px; color:#b0a9ff; letter-spacing:3px; text-transform:uppercase; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

        .container {
            width:100%; max-width:1200px; display:flex; align-items:center;
            justify-content:center; gap:clamp(15px,3vw,50px); padding:15px;
            margin-left:-15%; position:relative; z-index:10;
        }
        .brand-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-width:0; }
        .robot-container {
            width:min(350px,50vw); height:auto; max-width:100%;
            margin-bottom:clamp(10px,2vh,25px);
            filter:drop-shadow(0 20px 30px rgba(0,0,0,0.3));
            transition:transform 0.1s ease-out; opacity:0; transform:translateY(30px);
        }
        .robot-container.visible { opacity:1; transform:translateY(0); transition:opacity 0.3s ease, transform 0.3s ease; }
        .robot-container img { width:100%; height:auto; display:block; }
        .welcome-text {
            color:#ddd8fd; font-family:'Poetsen One',cursive;
            font-size:clamp(28px,5.5vw,52px); font-weight:800; line-height:1.1;
            text-shadow:-5px 2px 2px rgba(221,216,253,0.3); word-break:break-word;
            opacity:0; transform:translateY(30px);
        }
        .welcome-text.visible { opacity:1; transform:translateY(0); transition:opacity 0.3s ease, transform 0.3s ease; }

        .login-card {
            background:var(--card-bg); width:min(520px,92vw);
            padding:clamp(35px,6vh,55px) clamp(30px,5vw,45px);
            border-radius:clamp(20px,3vw,40px);
            border:2px solid rgba(124,102,227,0.3);
            box-shadow:0 25px 50px rgba(0,0,0,0.5); flex-shrink:0;
            opacity:0; transform:translateY(40px);
        }
        .login-card.visible { opacity:1; transform:translateY(0); transition:opacity 0.3s ease, transform 0.3s ease; }
        .login-card h2 {
            color:#e0d8fe; font-family:'Montserrat',sans-serif;
            font-size:clamp(32px,5.5vw,56px); margin-bottom:clamp(25px,4vh,45px);
            text-align:center; position:relative;
        }
        .login-card h2::after { display:none; }
        .in-underline { position:relative; display:inline-block; }
        .in-underline::after {
            content:''; position:absolute; bottom:0; left:0; width:100%; height:3px;
            background:#e0d8ff; border-radius:2px;
        }
        .form-group { margin-bottom:clamp(18px,3vh,28px); }
        .form-group label {
            display:block; margin-bottom:10px; font-family:'Montserrat',sans-serif;
            font-size:clamp(15px,1.8vw,18px); font-weight:600; color:#d1d1f7;
        }
        .form-group input {
            width:100%; padding:clamp(14px,2.5vh,18px) clamp(20px,3vw,28px);
            border-radius:clamp(12px,2.5vw,22px); border:none;
            background:var(--input-bg); color:#fff;
            font-family:'Montserrat',sans-serif; font-size:clamp(15px,1.8vw,18px);
            outline:none; transition:0.3s; min-height:55px;
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.4); }
        .form-group input:focus { background:#4a45a3; box-shadow:0 0 0 2px var(--accent-purple); }
        .forget-pass { text-align:right; margin-top:-12px; margin-bottom:clamp(20px,3.5vh,35px); }
        .forget-pass a { color:#d1d1f7; text-decoration:none; font-family:'Montserrat',sans-serif; font-size:clamp(13px,1.4vw,15px); opacity:0.8; }
        .forget-pass a:hover { opacity:1; text-decoration:underline; }

        .submit-btn {
            width:80%; display:block; margin:0 auto;
            padding:clamp(14px,2.5vh,18px); border-radius:clamp(22px,4vw,30px);
            border:none; background:var(--submit-btn); color:white;
            font-family:'Montserrat',sans-serif; font-size:clamp(18px,3vw,28px);
            font-weight:bold; cursor:pointer; transition:0.3s;
            box-shadow:0 5px 15px rgba(0,0,0,0.2); min-height:55px;
        }
        .submit-btn:hover { background:#5d53b8; transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .submit-btn:active { transform:translateY(0); }
        .submit-btn:disabled { opacity:0.7; cursor:not-allowed; transform:none; }

        .sign-in-text {
            text-align:center; margin-top:clamp(18px,3vh,25px);
            font-family:'Montserrat',sans-serif; font-size:clamp(13px,1.4vw,15px);
            color:#d1d1f7; font-weight:500;
        }
        .error-message {
            color:#ff6b6b; font-size:14px; text-align:center;
            margin-top:10px; min-height:20px; font-weight:500;
        }

        @media(max-width:900px){.container{flex-direction:column;gap:25px;margin-left:0;}.brand-section{order:1;width:100%;}.login-card{order:2;width:min(450px,90vw);}.robot-container{width:min(280px,50vw);}.welcome-text{font-size:clamp(26px,5vw,42px);}.morph-logo{width:clamp(120px,30vw,220px);}.intro-tagline{margin-top:clamp(60px,12vh,100px);}}
        @media(max-width:768px){.login-card{padding:clamp(22px,4vh,35px) clamp(18px,3vw,28px);}.robot-container{width:min(180px,50vw);}.welcome-text{font-size:clamp(20px,4vw,30px);}.submit-btn{width:85%;}.intro-tagline{margin-top:clamp(50px,10vh,90px);}}
        @media(max-width:600px){body{padding:0;}.container{gap:18px;}.brand-section{order:1;}.login-card{order:2;width:80%;padding:25px 18px;border-radius:18px;}.robot-container{width:min(220px,55vw);}.welcome-text{font-size:clamp(22px,5vw,34px);}.form-group input{font-size:16px;}.morph-logo{width:clamp(100px,35vw,180px);}.intro-tagline{margin-top:clamp(40px,8vh,80px);}}
        @media(max-width:480px){.brand-section{order:1;}.login-card{order:2;padding:20px 14px;border-radius:15px;width:100%;max-width:95vw;}.login-card h2{font-size:22px;margin-bottom:15px;}.form-group{margin-bottom:12px;}.form-group input{padding:10px 12px;min-height:45px;font-size:14px;}.forget-pass{margin-bottom:15px;}.submit-btn{width:90%;font-size:15px;padding:10px;min-height:45px;}.sign-in-text{margin-top:12px;font-size:12px;}.robot-container{width:min(110px,45vw);margin-bottom:15px;}.welcome-text{font-size:clamp(15px,4vw,19px);margin-bottom:20px;}.morph-logo{width:clamp(75px,32vw,130px);}.intro-tagline{margin-top:clamp(30px,6vh,60px);font-size:13px;}.scroll-indicator{bottom:20px!important;}.scroll-track{height:50px;}}
        @media(max-width:320px){.login-card{padding:18px 12px;}.login-card h2{font-size:22px;}.robot-container{width:110px;}.welcome-text{font-size:16px;}.form-group input{padding:9px 11px;font-size:14px;}.submit-btn{padding:9px;font-size:15px;width:95%;}.morph-logo{width:80px;}.intro-tagline{margin-top:30px;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}}
    </style>
</head>
<body>
    <div class="scroll-container" id="scrollContainer">
        <!-- SECTION 1: INTRO -->
        <section class="section" id="section-intro">
            <div class="animated-bg">
                <div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="glow-orb"></div><div class="glow-orb"></div>
            </div>
            <div class="morph-logo" id="morphLogo"><img src="img/Logo.png" alt="ChatNCT"></div>
            <p class="intro-tagline" id="introTagline">Your AI-Powered Chat Experience</p>
        </section>

        <!-- SECTION 2: LOGIN -->
        <section class="section" id="section-login">
            <div class="animated-bg">
                <div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
                <div class="glow-orb"></div><div class="glow-orb"></div>
            </div>
            <div class="container">
                <div class="brand-section">
                    <div class="robot-container" id="robotContainer"><img src="img/Character.png" alt="ChatNCT Character"></div>
                    <h1 class="welcome-text" id="welcomeText">Welcome to<br>Chat NCT</h1>
                </div>
                <div class="login-card" id="loginCard">
                    <h2>Log<span class="in-underline">in</span></h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" required autocomplete="current-password" placeholder="Enter your password">
                        </div>
                        <div class="forget-pass"><a href="#">Forget Password?</a></div>
                        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
                        <div class="sign-in-text">Sign in to chatNCT</div>
                        <div class="error-message" id="errorMessage"></div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-track"><div class="scroll-ball"></div></div>
        <span class="scroll-text">Scroll</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=4"></script>
    <script src="js/login.js?v=4"></script>
</body>
</html>
