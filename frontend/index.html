<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="img/Head of Charcter.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description"
        content="ChatNCT — AI-Powered University Assistant. Login to access chat, attendance, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        /* ── Theme init before paint ── */
        html[data-theme="light"] { background: #fafbfe; }
        :root, [data-theme="dark"] {
            --bg-primary: #0a0a0f;
            --card-bg: rgba(22, 22, 32, 0.92);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f1f4;
            --text-secondary: #a1a1b5;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #6366f1 50%, #4f46e5 100%);
            --divider: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(129, 140, 248, 0.08);
        }
        [data-theme="light"] {
            --bg-primary: #fafbfe;
            --card-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #f3f4f8;
            --input-border: rgba(0, 0, 0, 0.08);
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #4338ca 100%);
            --divider: rgba(0, 0, 0, 0.06);
            --glow-color: rgba(99, 102, 241, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; height: 100%; overflow: hidden; }

        body {
            height: 100vh; height: 100dvh;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden; width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background 0.4s cubic-bezier(0.4,0,0.2,1), color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .scroll-container {
            height: 100vh; height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: auto;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .section {
            height: 100vh; height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-primary);
        }

        /* ── Ambient Background ─────────────────────── */
        .animated-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            animation: particleFloat 20s infinite ease-in-out; opacity: 0.4;
        }
        .particle:nth-child(1) { width: 300px; height: 300px; top: 10%; left: 5%; }
        .particle:nth-child(2) { width: 200px; height: 200px; top: 60%; left: 75%; animation-delay: -5s; }
        .particle:nth-child(3) { width: 150px; height: 150px; top: 70%; left: 15%; animation-delay: -10s; }
        .particle:nth-child(4) { width: 250px; height: 250px; top: 30%; left: 80%; animation-delay: -3s; }
        .particle:nth-child(5) { width: 180px; height: 180px; top: 15%; left: 45%; animation-delay: -7s; }

        .glow-orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); animation: orbPulse 12s infinite ease-in-out;
        }
        .glow-orb:nth-child(1) { width: 400px; height: 400px; background: var(--glow-color); top: 20%; left: 15%; }
        .glow-orb:nth-child(2) { width: 300px; height: 300px; background: var(--glow-color); bottom: 15%; right: 20%; animation-delay: -6s; }

        @keyframes particleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(20px, -30px) scale(1.05); opacity: 0.5; }
            50% { transform: translate(-15px, 20px) scale(0.95); opacity: 0.35; }
            75% { transform: translate(15px, 15px) scale(1.02); opacity: 0.45; }
        }
        @keyframes orbPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.15); }
        }

        /* ── Intro Screen ─────────────────────────────── */
        .morph-logo {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: clamp(140px, 22vw, 260px); max-width: 90vw;
            z-index: 1001;
            filter: drop-shadow(0 4px 20px rgba(99, 102, 241, 0.4));
            animation: logoBreath 4s infinite ease-in-out;
            pointer-events: none;
        }
        .morph-logo img { width: 100%; height: auto; display: block; }

        @keyframes logoBreath {
            0%, 100% { filter: drop-shadow(0 4px 20px rgba(99, 102, 241, 0.4)); }
            50% { filter: drop-shadow(0 8px 40px rgba(99, 102, 241, 0.6)); }
        }

        .intro-tagline {
            font-size: clamp(13px, 1.8vw, 16px);
            color: var(--text-secondary);
            opacity: 0.9;
            margin-top: clamp(80px, 14vh, 120px);
            z-index: 10;
            animation: fadeInUp 0.8s ease 0.3s both;
            text-align: center;
            padding: 0 20px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ── Scroll Indicator ───────────────────────────── */
        .scroll-indicator {
            position: fixed; bottom: 36px !important;
            left: 50% !important; transform: translateX(-50%) !important;
            display: flex !important; flex-direction: column !important;
            align-items: center !important; gap: 10px;
            z-index: 9999 !important; cursor: pointer; opacity: 1;
        }
        .scroll-track {
            width: 2px; height: 48px;
            background: rgba(129, 140, 248, 0.15);
            border-radius: 2px; position: relative;
        }
        .scroll-ball {
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 8px;
            background: var(--accent); border-radius: 50%;
            animation: scrollBounce 2s infinite ease-in-out;
        }
        @keyframes scrollBounce {
            0%, 100% { top: 0; opacity: 0.4; }
            50% { top: calc(100% - 8px); opacity: 1; }
        }
        .scroll-text {
            font-size: 10px; color: var(--text-secondary);
            letter-spacing: 3px; text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Login Section ──────────────────────────────── */
        .container {
            width: 100%; max-width: 1100px;
            display: flex; align-items: center;
            justify-content: center;
            gap: clamp(20px, 4vw, 60px);
            padding: 20px; margin-left: -12%;
            position: relative; z-index: 10;
        }

        .brand-section {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; min-width: 0;
        }

        .robot-container {
            width: min(var(--img-robot-login, 400px), 45vw);
            height: auto; max-width: 100%;
            margin-bottom: clamp(10px, 2vh, 20px);
            filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.2));
            transition: transform 0.3s ease-out;
            opacity: 0; transform: translateY(30px);
        }
        .robot-container.visible {
            opacity: 1; transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        .robot-container img { width: 100%; height: auto; display: block; }

        .welcome-text {
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            opacity: 0; transform: translateY(30px);
        }
        .welcome-text.visible {
            opacity: 1; transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Login Card — Glassmorphism ─────────────────── */
        .login-card {
            background: var(--card-bg);
            width: min(480px, 92vw);
            padding: clamp(32px, 5vh, 48px) clamp(28px, 4vw, 40px);
            border-radius: 24px;
            border: 1px solid var(--divider);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
            backdrop-filter: blur(20px) saturate(180%);
            flex-shrink: 0;
            opacity: 0; transform: translateY(40px);
        }
        .login-card.visible {
            opacity: 1; transform: translateY(0);
            transition: opacity 0.5s ease 0.1s, transform 0.5s cubic-bezier(0.4,0,0.2,1) 0.1s;
        }

        .login-card h2 {
            color: var(--text-primary);
            font-size: clamp(28px, 4.5vw, 40px);
            margin-bottom: clamp(24px, 3.5vh, 36px);
            text-align: center;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .in-underline {
            position: relative; display: inline-block;
        }
        .in-underline::after {
            content: ''; position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 3px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: clamp(16px, 2.5vh, 24px);
        }
        .form-group label {
            display: block; margin-bottom: 8px;
            font-size: 13px; font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }
        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: var(--input-bg);
        }

        .forget-pass {
            text-align: right; margin-top: -8px;
            margin-bottom: clamp(20px, 3vh, 28px);
        }
        .forget-pass a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px; font-weight: 500;
            transition: color 0.2s ease;
        }
        .forget-pass a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%; display: block;
            padding: 14px 24px;
            border-radius: 14px; border: none;
            background: var(--accent-gradient);
            color: white;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }
        .submit-btn:hover::before { left: 100%; }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .sign-in-text {
            text-align: center; margin-top: clamp(16px, 2.5vh, 22px);
            font-size: 13px; color: var(--text-secondary);
            font-weight: 400;
        }

        .error-message {
            color: #f87171; font-size: 13px;
            text-align: center; margin-top: 10px;
            min-height: 20px; font-weight: 500;
        }

        /* ── Light Mode Overrides ───────────────────────── */
        [data-theme="light"] .section {
            background: linear-gradient(135deg, #fafbfe, #f0f1f8) !important;
        }
        [data-theme="light"] .login-card {
            box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04) !important;
        }
        [data-theme="light"] .error-message { color: #ef4444 !important; }

        /* ── Theme Toggle — Login ────────────────────────── */
        .login-theme-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            width: 42px; height: 42px; border-radius: 12px;
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            color: var(--accent); font-size: 18px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(10px);
        }
        .login-theme-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.08);
        }

        /* ── Responsive ─────────────────────────────────── */
        @media(max-width:900px) {
            .container { flex-direction: column; gap: 24px; margin-left: 0; }
            .brand-section { order: 1; width: 100%; }
            .login-card { order: 2; width: min(440px, 90vw); }
            .robot-container { width: min(260px, 45vw); }
            .welcome-text { font-size: clamp(24px, 4.5vw, 38px); }
            .morph-logo { width: clamp(110px, 28vw, 200px); }
        }
        @media(max-width:600px) {
            .container { gap: 16px; }
            .login-card { width: 90%; padding: 24px 20px; border-radius: 20px; }
            .robot-container { width: min(200px, 50vw); }
            .welcome-text { font-size: clamp(20px, 4vw, 30px); }
        }
        @media(max-width:480px) {
            .login-card { padding: 20px 16px; border-radius: 18px; width: 95%; }
            .login-card h2 { font-size: 24px; margin-bottom: 18px; }
            .form-group input { padding: 12px 14px; font-size: 15px; }
            .submit-btn { padding: 12px; font-size: 14px; }
            .robot-container { width: min(140px, 40vw); }
            .welcome-text { font-size: clamp(16px, 4vw, 20px); }
            .morph-logo { width: clamp(80px, 30vw, 130px); }
            .login-theme-btn { top: 12px; right: 12px; width: 38px; height: 38px; }
        }

        @media(prefers-reduced-motion:reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <!-- Inline theme init to prevent flash -->
    <script>(function () { document.documentElement.setAttribute('data-theme', 'dark'); })();</script>

    <div class="scroll-container" id="scrollContainer">
        <!-- SECTION 1: INTRO -->
        <section class="section" id="section-intro">
            <div class="animated-bg">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="glow-orb"></div>
                <div class="glow-orb"></div>
            </div>
            <div class="morph-logo" id="morphLogo"><img src="img/Logo.svg" alt="ChatNCT"></div>
            <p class="intro-tagline" id="introTagline">Your AI-Powered University Assistant</p>
        </section>

        <!-- SECTION 2: LOGIN -->
        <section class="section" id="section-login">
            <div class="animated-bg">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="glow-orb"></div>
                <div class="glow-orb"></div>
            </div>
            <div class="container">
                <div class="brand-section">
                    <div class="robot-container" id="robotContainer"><img src="img/Character.svg"
                            alt="ChatNCT Character"></div>
                    <h1 class="welcome-text" id="welcomeText">Welcome to<br>Chat NCT</h1>
                </div>
                <div class="login-card" id="loginCard">
                    <h2>Log<span class="in-underline">in</span></h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" required autocomplete="current-password"
                                placeholder="Enter your password">
                        </div>
                        <div class="forget-pass"><a href="#">Forget Password?</a></div>
                        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
                        <div class="sign-in-text">Sign in to chatNCT</div>
                        <div class="error-message" id="errorMessage"></div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <div class="scroll-track">
            <div class="scroll-ball"></div>
        </div>
        <span class="scroll-text">Scroll</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js?v=4"></script>
    <script src="js/login.js?v=4"></script>
    <script>
        // Theme toggle for login page (Stub: Light mode is disabled)
        function loginToggleTheme() {}
    </script>
</body>

</html>
