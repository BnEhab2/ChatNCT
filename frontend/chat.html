<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Dashboard & Chat</title>
    <meta name="description" content="ChatNCT AI Assistant — Chat with Jennifer, your university AI helper.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600&family=Poetsen+One&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* ── Main Container ─────────────────────────────────── */
        .main-container {
            width: 100%; max-width: 1400px; margin: 0 auto;
            padding: 90px 20px 0; position: relative; z-index: 10;
            height: calc(100vh - 0px); display: flex; flex-direction: column; overflow: hidden;
        }
        .view-section { display: none; animation: fadeIn 0.5s ease; flex: 1; overflow: hidden; }
        .view-section.active { display: flex; flex-direction: column; }

        /* ── Dashboard ──────────────────────────────────────── */
        .dashboard-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex: 1; text-align: center; overflow-y: auto;
        }
        .robot-character { width: 200px; height: 200px; margin-bottom: 30px; animation: floatRobot 3s infinite ease-in-out; }
        .robot-character img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 30px rgba(124,102,227,0.6)); }
        .greeting-text {
            font-family: 'Poetsen One', cursive; font-size: clamp(28px, 5vw, 42px);
            color: #e0d8fe; margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(124,102,227,0.5); line-height: 1.3;
        }
        .quick-actions { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .action-card {
            width: 120px; height: 120px; background: var(--panel-bg);
            border: 2px solid var(--panel-border); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .action-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(124,102,227,0.4); border-color: #7c66e3; }
        .action-card i { font-size: 34px; color: #e0d8fe; margin-bottom: 5px; }
        .action-card img { width: 50px; height: 50px; object-fit: contain; filter: brightness(0) invert(1); }
        .action-card span { color: #e0d8fe; font-size: 14px; font-weight: 600; text-align: center; }

        /* ── Chat ───────────────────────────────────────────── */
        .chat-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px 20px;
            display: flex; flex-direction: column; gap: 16px;
            scrollbar-width: thin; scrollbar-color: transparent transparent;
        }
        .chat-messages:hover { scrollbar-color: rgba(124,102,227,0.3) transparent; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; }
        .chat-messages:hover::-webkit-scrollbar-thumb { background: rgba(124,102,227,0.3); }

        .message-wrapper { display: flex; align-items: flex-end; gap: 12px; max-width: 70%; animation: messageSlide 0.3s ease; }
        .message-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-wrapper.bot { align-self: flex-start; }
        @keyframes messageSlide { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        .message-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .message-bubble {
            padding: 18px 28px; border-radius: 25px;
            font-family: 'Barlow Semi Condensed', sans-serif;
            font-size: 20px; line-height: 1.7;
            word-wrap: break-word; overflow-wrap: break-word; white-space: normal;
        }
        .message-bubble[dir="rtl"] { text-align: right; }
        .message-bubble[dir="ltr"] { text-align: left; }
        .message-bubble[dir="rtl"] ul, .message-bubble[dir="rtl"] ol { padding-left: 0; padding-right: 24px; }
        .message-bubble.bot { background: var(--message-bot); color: #1a173a; border-bottom-left-radius: 5px; }
        .message-bubble.user { background: var(--message-user); color: #ffffff; border-bottom-right-radius: 5px; }

        .message-bubble.bot h1,.message-bubble.bot h2,.message-bubble.bot h3,.message-bubble.bot h4 {
            margin: 12px 0 6px 0; font-weight: 700; line-height: 1.3; color: #1a0e3a;
        }
        .message-bubble.bot h1 { font-size: 1.3em; }
        .message-bubble.bot h2 { font-size: 1.15em; }
        .message-bubble.bot h3 { font-size: 1.05em; }
        .message-bubble.bot p { margin: 4px 0; }
        .message-bubble.bot ul,.message-bubble.bot ol { margin: 8px 0; padding-left: 24px; }
        .message-bubble.bot li { margin: 4px 0; }
        .message-bubble.bot strong { color: #1a0e3a; }
        .message-bubble.bot code {
            background: rgba(0,0,0,0.12); padding: 2px 6px; border-radius: 4px;
            font-family: 'Courier New', monospace; font-size: 0.9em;
        }
        .message-bubble.bot pre {
            background: rgba(0,0,0,0.15); padding: 12px 16px; border-radius: 10px;
            overflow-x: auto; margin: 10px 0; position: relative;
        }
        .message-bubble.bot pre code { background: none; padding: 0; font-size: 0.85em; }

        /* ── Input Area ─────────────────────────────────────── */
        .message-input-container {
            padding: 15px 20px 25px; position: relative; z-index: 10;
        }
        .message-input-wrapper {
            display: flex; align-items: flex-end; gap: 10px;
            background: var(--input-bg); border-radius: 25px;
            padding: 8px 15px; border: 2px solid rgba(124,102,227,0.3);
            transition: all 0.3s ease; position: relative;
        }
        .message-input-wrapper:focus-within { border-color: #7c66e3; box-shadow: 0 0 20px rgba(124,102,227,0.3); }

        .message-input {
            flex: 1; background: none; border: none; color: #fff;
            font-family: 'Barlow Semi Condensed', sans-serif; font-size: 18px;
            resize: none; outline: none; max-height: 200px;
            overflow-y: hidden; line-height: 1.5; padding: 8px 0;
        }
        .message-input::placeholder { color: rgba(255,255,255,0.4); }

        .send-button, .study-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; flex-shrink: 0;
        }
        .send-button {
            background: linear-gradient(135deg, #7c66e3, #5c4eb3);
            color: white; font-size: 16px;
        }
        .send-button:hover { transform: scale(1.1); box-shadow: 0 4px 15px rgba(124,102,227,0.5); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .study-btn {
            background: rgba(124,102,227,0.2); color: #b0a9ff; font-size: 18px;
            border: 1px solid rgba(124,102,227,0.3);
        }
        .study-btn:hover { background: rgba(124,102,227,0.4); }

        /* ── Study Popup ────────────────────────────────────── */
        .study-popup {
            position: absolute; bottom: 60px; left: 10px;
            background: rgba(28,26,74,0.98); border: 1px solid rgba(124,102,227,0.4);
            border-radius: 16px; padding: 10px; min-width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            display: none; animation: fadeIn 0.2s ease; z-index: 100;
        }
        .study-popup.active { display: block; }
        .popup-header {
            display: flex; align-items: center; gap: 8px; padding: 10px 12px;
            color: #e0d8fe; font-weight: 600; font-size: 14px;
            border-bottom: 1px solid rgba(124,102,227,0.3); margin-bottom: 5px;
        }
        .popup-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; color: #ddd8fd; cursor: pointer;
            border-radius: 10px; transition: all 0.2s ease; font-size: 14px;
        }
        .popup-item:hover { background: rgba(124,102,227,0.2); }
        .popup-item i { color: #b0a9ff; width: 20px; font-size: 16px; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 768px) {
            .message-wrapper { max-width: 85%; }
            .message-bubble { padding: 14px 20px; font-size: 17px; }
            .quick-actions { gap: 12px; }
            .action-card { width: 100px; height: 100px; border-radius: 20px; }
            .action-card i { font-size: 28px; }
            .action-card img { width: 40px; height: 40px; }
            .action-card span { font-size: 12px; }
            .robot-character { width: 150px; height: 150px; }
        }
        @media (max-width: 480px) {
            .message-wrapper { max-width: 92%; }
            .message-bubble { padding: 12px 16px; font-size: 16px; border-radius: 20px; }
            .message-input { font-size: 16px; }
            .main-container { padding: 70px 10px 0; }
        }
        /* ── Chat History Sidebar ──────────────────────────── */
        .chat-history-section { padding: 0 10px; margin-top: 5px; }
        .chat-history-header {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            color: #b0a9ff; font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chat-history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; color: #ddd8fd; cursor: pointer;
            border-radius: 10px; transition: all 0.2s ease; font-size: 14px;
            margin-bottom: 2px;
        }
        .chat-history-item:hover { background: rgba(124,102,227,0.15); }
        .chat-history-title {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            cursor: pointer;
        }
        .chat-history-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .chat-history-item:hover .chat-history-actions { opacity: 1; }
        .chat-history-btn {
            width: 28px; height: 28px; border: none; border-radius: 6px;
            background: rgba(124,102,227,0.2); color: #b0a9ff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
            transition: all 0.2s;
        }
        .chat-history-btn:hover { background: rgba(124,102,227,0.4); }
        .chat-history-btn.delete:hover { background: rgba(239,68,68,0.3); color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="img/Logo.png" alt="ChatNCT"></div>
            <button class="sidebar-close" id="sidebarClose" aria-label="Close menu"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-view="dashboard" onclick="switchView('dashboard', this)">
                <i class="fas fa-th-large"></i><span>Dashboard</span>
            </div>
            <div class="menu-item" data-view="chat" onclick="newChat(); if(window.innerWidth<=768) closeSidebar();">
                <i class="fas fa-plus-square"></i><span>New Chat</span>
            </div>
            <div class="menu-item" data-role="student" onclick="navigateTo('attendance')">
                <i class="fas fa-clipboard-check"></i><span>Attendance</span>
            </div>
            <div class="menu-item" data-role="instructor,admin" onclick="navigateTo('instructor')">
                <i class="fas fa-chalkboard-teacher"></i><span>Instructor Panel</span>
            </div>
            <div class="menu-item" onclick="navigateTo('prompt')">
                <i class="fas fa-magic"></i><span>Prompt Generator</span>
            </div>
            <div class="menu-divider"></div>
            <!-- Feature 1: Chat History -->
            <div class="chat-history-section">
                <div class="chat-history-header"><i class="fas fa-history"></i> Recent Chats</div>
                <div id="chatHistoryList"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info-brief">
                <div class="user-avatar" id="userAvatar">G</div>
                <div class="user-name" id="userNameDisplay">Guest</div>
            </div>
            <a href="#" class="sidebar-login" onclick="logout(); return false;">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span>
            </a>
        </div>
    </div>

    <nav class="navbar">
        <div class="navbar-left">
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <div class="chat-robot-icon"><img src="img/Character.png" alt="ChatNCT Robot"></div>
            <div class="chat-status"><span class="status-dot online"></span><span>ChatNCT is ready to help</span></div>
        </div>
        <div class="header-logo"><img src="img/Logo.png" alt="ChatNCT"></div>
    </nav>

    <div class="animated-bg">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="glow-orb"></div><div class="glow-orb"></div>
    </div>

    <div class="main-container">
        <div class="view-section active" id="dashboardView">
            <div class="dashboard-container">
                <div class="robot-character"><img src="img/Head of Charcter.png" alt="ChatNCT Robot"></div>
                <h1 class="greeting-text" id="greetingText">Hi, Guest<br>I'm ChatNCT</h1>
                <div class="quick-actions">
                    <div class="action-card" onclick="startChat('Help me study')">
                        <i class="fas fa-graduation-cap"></i><span>Study Help</span>
                    </div>
                    <div class="action-card" data-card-role="student" onclick="navigateTo('attendance')">
                        <img src="img/Groups.png" alt="Attendance"><span>Attendance</span>
                    </div>
                    <div class="action-card" data-card-role="instructor,admin" onclick="navigateTo('instructor')">
                        <i class="fas fa-chalkboard-teacher"></i><span>Instructor Panel</span>
                    </div>
                    <div class="action-card" onclick="navigateTo('prompt')">
                        <img src="img/Groupw.png" alt="Prompt"><span>Prompt Generator</span>
                    </div>
                    <div class="action-card" onclick="startChat('Explain a concept')">
                        <i class="fas fa-lightbulb"></i><span>Explain Topic</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="view-section" id="chatView">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages" role="log" aria-live="polite"></div>
            </div>
        </div>

        <div class="message-input-container" id="messageInputContainer">
            <div class="message-input-wrapper">
                <button class="study-btn" id="studyBtn" title="Study and Learn" aria-label="Study options">
                    <i class="fas fa-graduation-cap"></i>
                </button>
                <textarea class="message-input" id="messageInput" placeholder="Message ChatNCT..." rows="1" aria-label="Type your message"></textarea>
                <button class="send-button" id="sendButton" aria-label="Send message">
                    <i class="fas fa-arrow-up"></i>
                </button>
                <div class="study-popup" id="studyPopup" role="dialog" aria-modal="true">
                    <div class="popup-header"><i class="fas fa-graduation-cap"></i><span>Study and Learn</span></div>
                    <div class="popup-content">
                        <div class="popup-item" onclick="startChat('Quiz')"><i class="fas fa-question-circle"></i><span>Quiz</span></div>
                        <div class="popup-item" onclick="startChat('Summarize')"><i class="fas fa-compress-alt"></i><span>Summarize</span></div>
                        <div class="popup-item" onclick="startChat('Guided Learning')"><i class="fas fa-chalkboard-teacher"></i><span>Guided Learning</span></div>
                        <div class="popup-item" onclick="startChat('Explain a concept')"><i class="fas fa-lightbulb"></i><span>Explain Topic</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
