<!DOCTYPE html>
<html lang="en">

<head>
    <script>(function () { document.documentElement.setAttribute('data-theme', 'dark'); })();</script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="img/Head of Charcter.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Student Attendance</title>
    <meta name="description" content="ChatNCT Student Attendance — Scan QR code and verify face to record attendance.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="css/common.css?v=3">
    <style>
        body { overflow: auto; }

        .main-container {
            width: 100%; max-width: 900px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            padding: 88px 20px 32px;
            position: relative; z-index: 10; margin: 0 auto;
        }

        .qr-card {
            background: var(--card-bg);
            width: min(480px, 92vw);
            padding: clamp(32px, 5vh, 48px) clamp(28px, 4vw, 40px);
            border-radius: 24px;
            border: 1px solid var(--divider);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(20px) saturate(180%);
            display: flex; flex-direction: column; align-items: center;
            animation: fadeInUp 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s both;
            margin: 0 auto;
        }

        .qr-title {
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: clamp(24px, 4.5vw, 36px);
            margin-bottom: clamp(20px, 3.5vh, 30px);
            text-align: center; font-weight: 800;
            letter-spacing: -0.03em;
        }

        .qr-scanner {
            width: min(280px, 65vw); height: min(280px, 65vw);
            position: relative;
            margin: clamp(8px, 1.5vh, 16px) auto;
            border-radius: 20px; overflow: hidden;
            background: var(--bg-secondary);
            border: 2px dashed var(--divider);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }

        #qrReader { width: 100%; height: 100%; }
        #qrReader video { border-radius: 18px; }

        .qr-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.9; position: absolute; top: 0; left: 0;
        }

        .qr-icon-img {
            width: 100px; height: 100px; object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.3));
            animation: qrPulse 2.5s infinite ease-in-out;
        }

        @keyframes qrPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.04); opacity: 1; }
        }

        .qr-text {
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: clamp(14px, 2.2vw, 16px);
            text-align: center;
            margin-top: clamp(10px, 1.5vh, 16px);
            font-weight: 500;
        }

        .button-group {
            display: flex; flex-direction: column; gap: 12px;
            width: 100%; margin-top: clamp(16px, 2.5vh, 24px);
        }

        .camera-btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: 14px;
            border: 1px solid var(--divider);
            background: var(--accent-gradient);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            position: relative; overflow: hidden;
        }
        .camera-btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }
        .camera-btn:hover::before { left: 100%; }
        .camera-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4); }
        .camera-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back-btn {
            width: 100%; padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--divider);
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .back-btn:hover {
            background: var(--accent-muted);
            border-color: var(--accent);
            color: var(--accent);
        }

        #resultCard { display: none; width: 100%; margin-top: 12px; }

        /* Camera Modal */
        .camera-modal {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .camera-modal.active { display: flex; }

        .camera-container {
            width: 90%; max-width: 560px;
            background: var(--card-bg);
            border-radius: 24px; overflow: hidden;
            border: 1px solid var(--divider);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px) saturate(180%);
        }

        .camera-header {
            padding: 18px 24px;
            background: var(--accent-subtle);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--divider);
        }
        .camera-header h3 {
            color: var(--text-primary);
            font-size: 16px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
        }
        .close-camera {
            background: var(--accent-muted); border: none;
            width: 34px; height: 34px; border-radius: 10px;
            cursor: pointer; color: var(--text-secondary); font-size: 16px;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; justify-content: center;
        }
        .close-camera:hover { background: var(--accent); color: white; transform: rotate(90deg); }

        .camera-view {
            width: 100%; height: 400px; background: #000;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        #videoElement { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .camera-footer { padding: 18px; display: flex; justify-content: center; gap: 12px; }

        @media (max-width: 480px) {
            .qr-scanner { width: min(240px, 60vw); height: min(240px, 60vw); }
            .qr-icon-img { width: 80px; height: 80px; }
            .camera-view { height: 300px; }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="img/Logo.svg" alt="ChatNCT"></div>
            <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><i class="fas fa-th-large"></i><span>Dashboard</span></div>
            <div class="menu-item" onclick="navigateTo('chat')"><i class="fas fa-plus-square"></i><span>New Chat</span></div>
            <div class="menu-item active" data-role="student" onclick="navigateTo('attendance')"><i class="fas fa-clipboard-check"></i><span>Attendance</span></div>
            <div class="menu-item" data-role="instructor,admin" onclick="navigateTo('instructor')"><i class="fas fa-chalkboard-teacher"></i><span>Instructor Panel</span></div>
            <div class="menu-item" onclick="navigateTo('prompt')"><i class="fas fa-magic"></i><span>Prompt Generator</span></div>
            <div class="menu-divider"></div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info-brief">
                <div class="user-avatar" id="userAvatar">G</div>
                <div class="user-name" id="userNameDisplay">Guest</div>
            </div>

            <a href="#" class="sidebar-login" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
        <div class="header-logo"><img src="img/Logo.svg" alt="ChatNCT"></div>
    </nav>

    <!-- Camera Modal (for selfie) -->
    <div class="camera-modal" id="cameraModal">
        <div class="camera-container">
            <div class="camera-header">
                <h3><i class="fas fa-camera"></i> Take Selfie</h3>
                <button class="close-camera" id="closeCamera"><i class="fas fa-times"></i></button>
            </div>
            <div class="camera-view">
                <video id="videoElement" autoplay playsinline></video>
            </div>
            <div class="camera-footer">
                <button class="camera-btn" id="captureBtn" style="width:auto; padding:12px 28px; display:none;">
                    <i class="fas fa-camera"></i> Capture & Verify
                </button>
            </div>
        </div>
    </div>

    <div class="animated-bg">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="glow-orb"></div><div class="glow-orb"></div>
    </div>

    <div class="main-container">
        <div class="qr-card">
            <h1 class="qr-title">Scan QR Code</h1>
            <div class="qr-scanner" id="qrScanner">
                <div id="qrReader"></div>
                <div class="qr-placeholder" id="qrPlaceholder">
                    <img src="img/Grcoup.png" alt="QR Code" class="qr-icon-img">
                </div>
            </div>
            <p class="qr-text" id="statusText">Point your camera at the QR code</p>
            <div id="resultCard"></div>
            <div class="button-group">
                <button class="camera-btn" id="cameraBtn"><i class="fas fa-camera"></i> Open Camera</button>
                <button class="back-btn" onclick="navigateTo('dashboard')">Back to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/common.js"></script>
    <script>(async () => { await requireAuth(); })();</script>
    <script src="js/attendance.js"></script>
</body>

</html>
