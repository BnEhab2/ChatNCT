<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Prompt Generator</title>
    <meta name="description"
        content="ChatNCT Prompt Generator — Create professional AI prompts using CO-STAR framework.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600&family=Poetsen+One&family=Montserrat:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            overflow: auto;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        .page-title {
            font-family: 'Poetsen One', cursive;
            font-size: clamp(28px, 5vw, 42px);
            color: #e0d8fe;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(124, 102, 227, 0.5);
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .panel-card {
            background: var(--card-bg);
            border-radius: 25px;
            border: 2px solid rgba(124, 102, 227, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            padding: 30px;
            animation: fadeInUp 0.6s ease;
            display: flex;
            flex-direction: column;
        }

        .panel-card:nth-child(2) {
            animation-delay: 0.15s;
        }

        .card-title {
            color: #e0d8fe;
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #7c66e3;
            font-size: 22px;
        }

        .idea-input,
        .prompt-output {
            width: 100%;
            background: rgba(62, 58, 131, 0.8);
            border: 2px solid rgba(124, 102, 227, 0.4);
            border-radius: 15px;
            padding: 18px 20px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        .idea-input {
            min-height: 140px;
            margin-bottom: 20px;
        }

        .idea-input::placeholder,
        .prompt-output::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .idea-input:focus,
        .prompt-output:focus {
            border-color: #7c66e3;
            box-shadow: 0 0 20px rgba(124, 102, 227, 0.3);
        }

        .prompt-output {
            flex: 1;
            min-height: 250px;
            overflow-y: auto;
        }

        .upload-strip {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .upload-mini-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid rgba(124, 102, 227, 0.4);
            background: rgba(62, 58, 131, 0.5);
            color: #ddd8fd;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-mini-btn:hover {
            background: rgba(124, 102, 227, 0.3);
            border-color: #7c66e3;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(124, 102, 227, 0.3);
        }

        .upload-mini-btn i {
            color: #b0a9ff;
            font-size: 16px;
        }

        .action-btn-lg {
            width: 100%;
            padding: 14px 24px;
            border-radius: 20px;
            border: 2px solid rgba(124, 102, 227, 0.6);
            background: linear-gradient(135deg, rgba(124, 102, 227, 0.3), rgba(92, 78, 179, 0.3));
            color: #e0d8fe;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn-lg:hover {
            background: linear-gradient(135deg, rgba(124, 102, 227, 0.5), rgba(92, 78, 179, 0.5));
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 102, 227, 0.4);
        }

        .action-btn-lg:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn-lg.execute {
            margin-top: 15px;
            border-color: rgba(34, 197, 94, 0.6);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(22, 163, 74, 0.2));
        }

        .action-btn-lg.execute:hover {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.35), rgba(22, 163, 74, 0.35));
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .costar-hint {
            margin-top: 15px;
            padding: 15px 18px;
            border-radius: 15px;
            background: rgba(124, 102, 227, 0.1);
            border: 1px solid rgba(124, 102, 227, 0.25);
            color: #b0a9ff;
            font-size: 13px;
            line-height: 1.6;
        }

        .costar-hint strong {
            color: #e0d8fe;
        }

        /* Full-width section below grid */
        .prompt-footer {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px 0 0;
            color: rgba(176, 169, 255, 0.5);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .prompt-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .panel-card {
                padding: 20px;
                border-radius: 18px;
            }

            .page-title {
                font-size: clamp(22px, 5vw, 32px);
                margin-bottom: 25px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="img/Logo.png" alt="ChatNCT"></div>
            <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><i
                    class="fas fa-th-large"></i><span>Dashboard</span></div>
            <div class="menu-item" onclick="navigateTo('chat')"><i class="fas fa-plus-square"></i><span>New Chat</span>
            </div>
            <div class="menu-item" data-role="student" onclick="navigateTo('attendance')"><i
                    class="fas fa-clipboard-check"></i><span>Attendance</span></div>
            <div class="menu-item" data-role="instructor,admin" onclick="navigateTo('instructor')"><i
                    class="fas fa-chalkboard-teacher"></i><span>Instructor Panel</span></div>
            <div class="menu-item active" onclick="navigateTo('prompt')"><i class="fas fa-magic"></i><span>Prompt
                    Generator</span></div>
            <div class="menu-divider"></div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info-brief">
                <div class="user-avatar" id="userAvatar">G</div>
                <div class="user-name" id="userNameDisplay">Guest</div>
            </div>
            <a href="#" class="sidebar-login" onclick="logout(); return false;"><i
                    class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
        <div class="header-logo"><img src="img/Logo.png" alt="ChatNCT"></div>
    </nav>

    <div class="animated-bg">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
    </div>

    <div class="main-container">
        <h1 class="page-title">✨ Prompt Generator</h1>
        <div class="prompt-grid">
            <!-- Input Panel -->
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-lightbulb"></i> Your Idea</div>
                <textarea class="idea-input" placeholder="Describe what you want the AI to do..."></textarea>
                <div class="upload-strip">
                    <button class="upload-mini-btn" id="pasteBtn" type="button"><i class="fas fa-paste"></i>
                        Paste</button>
                    <button class="upload-mini-btn" id="uploadBtn" type="button"><i class="fas fa-upload"></i>
                        Upload</button>
                    <input type="file" id="fileInput" style="display: none;" multiple>
                </div>
                <button class="action-btn-lg generate-btn" type="button"><i class="fas fa-wand-magic-sparkles"></i>
                    Generate Prompt</button>
                <div class="costar-hint">
                    <strong>💡 CO-STAR Framework:</strong> Your prompt will be structured with <strong>Context</strong>,
                    <strong>Objective</strong>, <strong>Style</strong>, <strong>Tone</strong>,
                    <strong>Audience</strong>, and <strong>Response format</strong>.
                </div>
            </div>
            <!-- Output Panel -->
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-scroll"></i> Generated Prompt</div>
                <textarea class="prompt-output" placeholder="Your professional prompt will appear here..."></textarea>
                <button class="action-btn-lg execute execute-btn" type="button"><i class="fas fa-paper-plane"></i>
                    Execute in Chat</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/prompt.js"></script>
</body>

</html>
