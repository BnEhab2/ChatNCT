<!DOCTYPE html>
<html lang="en">

<head>
    <script>(function () { document.documentElement.setAttribute('data-theme', 'dark'); })();</script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="img/Head of Charcter.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNCT - Prompt Generator</title>
    <meta name="description"
        content="ChatNCT Prompt Generator — Create professional AI prompts using CO-STAR framework.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css?v=3">
    <style>
        body { overflow: auto; }

        .main-container {
            width: 100%; max-width: 1100px; margin: 0 auto;
            padding: 88px 24px 40px; position: relative; z-index: 10;
            min-height: 100vh;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: clamp(26px, 4.5vw, 38px);
            color: var(--text-primary); text-align: center;
            margin-bottom: 36px; font-weight: 800;
            letter-spacing: -0.03em;
        }

        .prompt-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 24px; max-width: 1000px; margin: 0 auto;
        }

        .panel-card {
            background: var(--card-bg); border-radius: 20px;
            border: 1px solid var(--divider);
            box-shadow: var(--card-shadow);
            padding: 28px;
            animation: fadeInUp 0.5s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
            backdrop-filter: blur(16px) saturate(180%);
        }
        .panel-card:nth-child(2) { animation-delay: 0.1s; }

        .card-title {
            color: var(--text-primary); font-family: 'Inter', sans-serif;
            font-size: 16px; font-weight: 700; margin-bottom: 18px;
            display: flex; align-items: center; gap: 10px;
            letter-spacing: -0.01em;
        }
        .card-title i { color: var(--accent); font-size: 18px; }

        .idea-input,
        .prompt-output {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none; outline: none;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            line-height: 1.7;
        }
        .idea-input { min-height: 130px; margin-bottom: 16px; }
        .idea-input::placeholder,
        .prompt-output::placeholder {
            color: var(--text-tertiary);
        }
        .idea-input:focus,
        .prompt-output:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--input-focus-ring);
        }
        .prompt-output { flex: 1; min-height: 240px; overflow-y: auto; }

        .upload-strip {
            display: flex; gap: 10px; margin-bottom: 16px;
        }

        .upload-mini-btn {
            flex: 1; padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--divider);
            background: var(--accent-subtle);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .upload-mini-btn:hover {
            background: var(--accent-muted);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 102, 227, 0.1);
        }
        .upload-mini-btn i { color: var(--accent); font-size: 14px; }

        .action-btn-lg {
            width: 100%; padding: 12px 20px; border-radius: 14px;
            border: 1px solid var(--divider);
            background: var(--accent-gradient);
            color: white; font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(124, 102, 227, 0.3);
            position: relative; overflow: hidden;
        }
        .action-btn-lg::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }
        .action-btn-lg:hover::before { left: 100%; }
        .action-btn-lg:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 102, 227, 0.4);
        }
        .action-btn-lg:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .action-btn-lg.execute {
            margin-top: 14px;
            background: linear-gradient(135deg, #34d399 0%, #10b981 50%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .action-btn-lg.execute:hover {
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
        }

        .costar-hint {
            margin-top: 14px; padding: 14px 16px;
            border-radius: 14px;
            background: var(--accent-subtle);
            border: 1px solid var(--divider);
            color: var(--text-secondary);
            font-size: 12px; line-height: 1.7; font-weight: 500;
        }
        .costar-hint strong { color: var(--text-primary); }

        .prompt-footer {
            grid-column: 1 / -1; text-align: center;
            padding: 16px 0 0; color: var(--text-tertiary);
            font-size: 12px; font-weight: 500;
        }

        @media (max-width: 768px) {
            .prompt-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .panel-card { padding: 20px; border-radius: 16px; }
            .page-title { font-size: clamp(22px, 4.5vw, 30px); margin-bottom: 24px; }
            .main-container { padding: 72px 16px 32px; }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="img/Logo.svg" alt="ChatNCT"></div>
            <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><i class="fas fa-th-large"></i><span>Dashboard</span></div>
            <div class="menu-item" onclick="navigateTo('chat')"><i class="fas fa-plus-square"></i><span>New Chat</span></div>
            <div class="menu-item" data-role="student" onclick="navigateTo('attendance')"><i class="fas fa-clipboard-check"></i><span>Attendance</span></div>
            <div class="menu-item" data-role="instructor,admin" onclick="navigateTo('instructor')"><i class="fas fa-chalkboard-teacher"></i><span>Instructor Panel</span></div>
            <div class="menu-item active" onclick="navigateTo('prompt')"><i class="fas fa-magic"></i><span>Prompt Generator</span></div>
            <div class="menu-divider"></div>
        </div>
        <div class="sidebar-footer">
            <div class="user-info-brief">
                <div class="user-avatar" id="userAvatar">G</div>
                <div class="user-name" id="userNameDisplay">Guest</div>
            </div>

            <a href="#" class="sidebar-login" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
        <div class="header-logo"><img src="img/Logo.svg" alt="ChatNCT"></div>
    </nav>

    <div class="animated-bg">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="glow-orb"></div><div class="glow-orb"></div>
    </div>

    <div class="main-container">
        <h1 class="page-title"> Prompt Generator</h1>
        <div class="prompt-grid">
            <!-- Input Panel -->
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-lightbulb"></i> Your Idea</div>
                <textarea class="idea-input" placeholder="Describe what you want the AI to do..."></textarea>
                <div class="upload-strip">
                    <button class="upload-mini-btn" id="pasteBtn" type="button"><i class="fas fa-paste"></i>
                        Paste</button>
                    <button class="upload-mini-btn" id="uploadBtn" type="button"><i class="fas fa-upload"></i>
                        Upload</button>
                    <input type="file" id="fileInput" style="display: none;" multiple>
                </div>
                <button class="action-btn-lg generate-btn" type="button"><i class="fas fa-wand-magic-sparkles"></i>
                    Generate Prompt</button>
                <div class="costar-hint">
                    <strong> CO-STAR Framework:</strong> Your prompt will be structured with <strong>Context</strong>,
                    <strong>Objective</strong>, <strong>Style</strong>, <strong>Tone</strong>,
                    <strong>Audience</strong>, and <strong>Response format</strong>.
                </div>
            </div>
            <!-- Output Panel -->
            <div class="panel-card">
                <div class="card-title"><i class="fas fa-scroll"></i> Generated Prompt</div>
                <textarea class="prompt-output" placeholder="Your professional prompt will appear here..."></textarea>
                <button class="action-btn-lg execute execute-btn" type="button"><i class="fas fa-paper-plane"></i>
                    Execute in Chat</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/common.js"></script>
    <script>(async () => { await requireAuth(); })();</script>
    <script src="js/prompt.js"></script>
</body>

</html>
