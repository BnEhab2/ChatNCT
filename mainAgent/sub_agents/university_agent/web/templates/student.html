<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student — Face Check-In</title>
    <link rel="stylesheet" href="/static/css/student.css">
</head>

<body>
    <div class="container">
        <h1>📸 Face Check-In</h1>
        <p class="subtitle">Verify your identity to record attendance</p>

        <div class="steps">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <!-- Session Banner -->
        <div class="session-banner" id="sessionBanner">
            <div class="course-name" id="bannerCourse"></div>
            <div class="instructor" id="bannerInstructor"></div>
        </div>

        <!-- Step 1: Enter Code + Student ID -->
        <div class="card" id="step1Card">
            <h2>1️⃣ Session & Student Info</h2>

            <label for="sessionCodeInput">Session Code</label>
            <input type="text" id="sessionCodeInput" placeholder="e.g. AB3X7K" maxlength="6"
                style="text-transform:uppercase; letter-spacing:4px; text-align:center; font-size:1.3rem;">

            <label for="studentIdInput">Student ID</label>
            <input type="text" id="studentIdInput" placeholder="e.g. 2024001">

            <button class="btn btn-primary" id="validateBtn" onclick="validateSession()">
                Next →
            </button>
            <div id="step1Msg"></div>
        </div>

        <!-- Step 2: Camera & Liveness Challenge -->
        <div class="card" id="step2Card" style="display: none;">
            <h2>2️⃣ Liveness Check</h2>

            <div class="camera-container">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="captureCanvas" style="display:none;"></canvas>
                <canvas id="overlayCanvas"></canvas>

                <!-- Liveness challenge overlay -->
                <div class="liveness-overlay" id="livenessOverlay">
                    <div class="liveness-instruction" id="livenessInstruction">Loading face detector...</div>
                </div>
            </div>

            <!-- Liveness progress -->
            <div class="liveness-progress" id="livenessProgress">
                <div class="liveness-step" id="ls-center1">
                    <span class="ls-icon">↑</span>
                    <span class="ls-label">Center</span>
                </div>
                <div class="liveness-step" id="ls-left">
                    <span class="ls-icon">←</span>
                    <span class="ls-label">Left</span>
                </div>
                <div class="liveness-step" id="ls-right">
                    <span class="ls-icon">→</span>
                    <span class="ls-label">Right</span>
                </div>
                <div class="liveness-step" id="ls-center2">
                    <span class="ls-icon">↑</span>
                    <span class="ls-label">Center</span>
                </div>
            </div>

            <div id="step2Msg"></div>
        </div>

        <!-- Step 3: Result -->
        <div class="card" id="step3Card" style="display: none;">
            <div class="result" id="resultBox">
                <div class="result-icon" id="resultIcon"></div>
                <h3 id="resultTitle"></h3>
                <p id="resultMsg"></p>
            </div>
            <button class="btn btn-primary" onclick="resetFlow()" style="margin-top: 12px;">
                ← Start Over
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="/static/js/student.js"></script>
</body>

</html>
